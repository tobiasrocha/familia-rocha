name: CI/CD Pipeline

on:
  push:
    branches: [master, homolog, dev]
  pull_request:
    branches: [master, homolog]

env:
  PROJECT_ID: familia-rocha-7ea1a
  REGION: us-central1
  SERVICE_NAME: familiarocha-api
  ARTIFACT_REPO: familiarocha
  IMAGE_NAME: api

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: LINT + TEST (todas as branches)
  # ──────────────────────────────────────────────
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install Frontend Deps
        run: npm ci
        working-directory: frontend

      - name: Lint Frontend
        run: npm run lint
        working-directory: frontend

      - name: Test Frontend
        run: npm test
        working-directory: frontend

      - name: Install Backend Deps
        run: npm ci
        working-directory: backend

      - name: Lint Backend
        run: npm run lint
        working-directory: backend

      - name: Test Backend
        run: npm test
        working-directory: backend

  # ──────────────────────────────────────────────
  # JOB 2: DEPLOY BACKEND (apenas push na master)
  # ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Cloud Run
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          secrets: |
            GOOGLE_APPLICATION_CREDENTIALS=credenciais-google:latest
            GOOGLE_OAUTH_CLIENT_ID=oauth-client-id:latest
            GOOGLE_OAUTH_CLIENT_SECRET=oauth-client-secret:latest
            GOOGLE_OAUTH_REFRESH_TOKEN=oauth-refresh-token:latest
          env_vars: |
            GOOGLE_CLOUD_PROJECT_ID=${{ env.PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=us
            DOCUMENT_AI_PROCESSOR_ID=4cad7feb06d834dd
            TESSERACT_ENABLED=false
            CRON_ENABLED=false
            CLOUD_LOGGING_ONLY=true
          flags: --memory=512Mi,--timeout=300,--allow-unauthenticated,--no-cpu-throttling

  # ──────────────────────────────────────────────
  # JOB 3: BUILD FRONTEND (master + homolog)
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/homolog')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build
        run: |
          npm ci
          npm run build
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ──────────────────────────────────────────────
  # JOB 4: DEPLOY FRONTEND — PRODUÇÃO (master)
  # ──────────────────────────────────────────────
  deploy-frontend-prod:
    name: Deploy Frontend → Firebase Hosting (Prod)
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Firebase Hosting (Production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ env.PROJECT_ID }}

  # ──────────────────────────────────────────────
  # JOB 5: DEPLOY FRONTEND — PREVIEW (homolog)
  # ──────────────────────────────────────────────
  deploy-frontend-homolog:
    name: Deploy Frontend → Firebase Preview (Homolog)
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/homolog'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Firebase Preview Channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: homolog
          projectId: ${{ env.PROJECT_ID }}
